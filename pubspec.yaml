name: mkenya_sms_pro
description: Mkenya SMS Pro - Smart. Fast. Personal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # SMS - Core functionality
  telephony: ^0.2.0
  
  # Contacts
  flutter_contacts: ^1.1.7+1
  
  # Local storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # UI & Animations
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  
  # Biometrics / App Lock
  local_auth: ^2.1.8
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Image picker (for profile/wallpaper)
  image_picker: ^1.0.7
  
  # Time & scheduling
  flutter_datetime_picker_plus: ^2.1.0
  
  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
